<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мебель Онлайн</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f6f6f6; }
    header { background: #333; color: white; padding: 15px; text-align: center; }
    .catalog { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
    .item { background: white; border-radius: 8px; padding: 10px; text-align: center; width: 200px; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
    .item img { width: 100%; border-radius: 8px; }
    footer { background: #333; color: white; text-align: center; padding: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>Мебель Онлайн</h1>
    <p>Качественная мебель для вашего дома</p>
  </header>
  <section class="catalog">
    <div class="item">
      <img src="[via.placeholder.com](https://via.placeholder.com/200x150)" alt="Диван">
      <h3>Диван Комфорт</h3>
      <p>25 000 ₽</p>
    </div>
    <div class="item">
      <img src="[via.placeholder.com](https://via.placeholder.com/200x150)" alt="Стул">
      <h3>Стул Элегант</h3>
      <p>3 500 ₽</p>
    </div>
    <div class="item">
      <img src="[via.placeholder.com](https://via.placeholder.com/200x150)" alt="Стол">
      <h3>Обеденный стол</h3>
      <p>12 000 ₽</p>
    </div>
  </section>
  <footer>
    <p>© 2024 Мебель Онлайн</p>
  </footer>
</body>
</html>
